services:
  app:
    build: .
    container_name: pydev
    volumes:
      - ./src:/src
    environment:
      - DB_HOST=db
    depends_on:
      - db
    ports:
      - "80:8000"
    command: python3 /src/index.py

  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: abc123
      MYSQL_DATABASE: my_db
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: abc123
      PMA_ARBITRARY: 1
    depends_on:
      - db