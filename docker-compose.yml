services:
  app:
    build: .
    container_name: pydev
    volumes:
      - /D/work/src:/src
    environment:
      - DB_HOST=db
    depends_on:
      - db
    ports:
      - "8000:8000"

  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: abc123
      MYSQL_DATABASE: my_db
    ports:
      - "3306:3306"