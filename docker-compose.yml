services:
  app:
    build: .
    container_name: pydev
    volumes:
      - /D/work/src:/src
    environment:
      - DB_HOST=db
    depends_on:
      - db
    ports:
      - "8000:8000"

  db:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: abc123
      MYSQL_DATABASE: my_db
    ports:
      - "3306:3306"

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
    depends_on:
      - app
    volumes:
      - /D/work/web/conf.d/:/etc/nginx/conf.d/
      - /D/work/web:/web