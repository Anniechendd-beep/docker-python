services:
  app:
    build: .
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
    depends_on:
      - db
    ports:
      - "8000:8000"

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: abc123
      MYSQL_DATABASE: my_db
    ports:
      - "3306:3306"